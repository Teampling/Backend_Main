<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 상세 - 팀플링</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">팀플링</a>
        <div class="nav-links" id="nav-links"></div>
    </header>

    <main>
        <div class="auth-container" style="max-width: 900px; margin: 0 auto; padding: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
                <div>
                    <h1 id="notice-title" style="margin-bottom: 0.5rem;">공지사항 로드 중...</h1>
                    <p id="notice-date" style="color: #6c757d; font-size: 0.9rem;"></p>
                </div>
                <div id="leader-actions" class="hidden" style="display: flex; gap: 0.5rem;">
                    <button class="btn-sm btn-outline" onclick="editNotice()">수정</button>
                    <button class="btn-sm btn-danger" onclick="deleteNotice()">삭제</button>
                </div>
            </div>
            
            <div id="notice-detail" style="white-space: pre-wrap; line-height: 1.8; color: #333; min-height: 300px;">
                내용을 불러오고 있습니다...
            </div>

            <div style="margin-top: 3rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
                <button class="btn-outline" onclick="location.href='/static/project-detail.html?id=' + projectId" style="width: auto;">목록으로 돌아가기</button>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('project_id');
        const noticeId = urlParams.get('notice_id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!projectId || !noticeId) {
                alert('잘못된 접근입니다.');
                location.href = '/';
                return;
            }
            setupHeader();
            await loadNoticeDetail();
            await checkLeaderStatus();
        });

        function setupHeader() {
            const navLinks = document.getElementById('nav-links');
            const displayName = localStorage.getItem('user_username') || '사용자';
            const profileImg = localStorage.getItem('user_profile') && localStorage.getItem('user_profile') !== 'null'
                ? localStorage.getItem('user_profile') 
                : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            navLinks.innerHTML = `
                <div class="user-profile-info" onclick="location.href='/static/profile.html'" style="cursor: pointer;">
                    <img src="${profileImg}" alt="profile" class="header-profile-img">
                    <span class="user-nickname">${displayName}</span>
                </div>
            `;
        }

        async function loadNoticeDetail() {
            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch(`/project/${projectId}/notice/${noticeId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const result = await response.json();
                    document.getElementById('notice-title').innerText = result.data.title;
                    document.getElementById('notice-date').innerText = `작성일: ${result.data.created_at.split('T')[0]}`;
                    document.getElementById('notice-detail').innerText = result.data.detail;
                } else {
                    alert('공지사항을 찾을 수 없습니다.');
                    history.back();
                }
            } catch (e) { console.error(e); }
        }

        async function checkLeaderStatus() {
            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch(`/project/${projectId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const result = await response.json();
                    if (result.data.is_leader) {
                        document.getElementById('leader-actions').classList.remove('hidden');
                    }
                }
            } catch (e) {}
        }

        function editNotice() {
            location.href = `/static/notice-create.html?project_id=${projectId}&notice_id=${noticeId}`;
        }

        async function deleteNotice() {
            if (!confirm('정말로 이 공지사항을 삭제하시겠습니까?')) return;
            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch(`/project/${projectId}/notice/${noticeId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    alert('삭제되었습니다.');
                    location.href = `/static/project-detail.html?id=${projectId}`;
                } else {
                    alert('삭제 실패');
                }
            } catch (e) { alert('오류 발생'); }
        }
    </script>
</body>
</html>
