<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 프로젝트 생성 - 팀플링</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">팀플링</a>
        <div class="nav-links" id="nav-links"></div>
    </header>

    <main>
        <div class="auth-container" style="max-width: 600px;">
            <h2>새 프로젝트 생성</h2>
            <p style="text-align: center; color: #6c757d; margin-bottom: 2rem;">새로운 팀 프로젝트를 시작해보세요!</p>
            
            <form id="project-create-form">
                <div class="form-group">
                    <label for="name">프로젝트 이름</label>
                    <input type="text" id="name" required placeholder="예: 캡스톤 디자인 A팀">
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="start_date">시작일</label>
                        <input type="date" id="start_date" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="end_date">종료일</label>
                        <input type="date" id="end_date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="detail">상세 설명</label>
                    <textarea id="detail" rows="5" placeholder="프로젝트의 목적이나 주요 내용을 입력하세요 (선택사항)"></textarea>
                </div>

                <button type="submit" class="btn-primary">프로젝트 생성하기</button>
                <button type="button" onclick="history.back()" class="btn-primary" style="background-color: #6c757d; margin-top: 0.5rem;">취소</button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            if (!token) {
                location.href = '/static/login.html';
                return;
            }
            setupHeader();
            
            // 오늘 날짜를 기본 시작일로 설정
            document.getElementById('start_date').value = new Date().toISOString().split('T')[0];
        });

        function setupHeader() {
            const navLinks = document.getElementById('nav-links');
            const displayName = localStorage.getItem('user_username') || '사용자';
            const profileImg = localStorage.getItem('user_profile') && localStorage.getItem('user_profile') !== 'null'
                ? localStorage.getItem('user_profile') 
                : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            navLinks.innerHTML = `
                <div class="user-profile-info" onclick="location.href='/static/profile.html'" style="cursor: pointer;">
                    <img src="${profileImg}" alt="profile" class="header-profile-img">
                    <span class="user-nickname">${displayName}</span>
                    <button onclick="event.stopPropagation(); logout()" style="color: #6c757d; font-size: 0.85rem; padding: 0.2rem 0.5rem; border: 1px solid #dee2e6; border-radius: 4px; margin-left: 5px;">로그아웃</button>
                </div>
            `;
        }

        document.getElementById('project-create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('access_token');
            
            const data = {
                name: document.getElementById('name').value,
                start_date: document.getElementById('start_date').value,
                end_date: document.getElementById('end_date').value,
                detail: document.getElementById('detail').value
            };

            try {
                const response = await fetch('/project', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    alert('프로젝트가 생성되었습니다!');
                    location.href = `/static/project-detail.html?id=${result.data.id}`;
                } else {
                    const err = await response.json();
                    alert('생성 실패: ' + (err.detail || '알 수 없는 오류'));
                }
            } catch (error) {
                alert('통신 오류 발생');
            }
        });

        function logout() {
            localStorage.clear();
            location.href = '/static/index.html';
        }
    </script>
</body>
</html>
