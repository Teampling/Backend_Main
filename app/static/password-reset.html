<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 팀플링</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">팀플링</a>
    </header>

    <main>
        <div class="auth-container">
            <h2>비밀번호 찾기</h2>
            
            <form id="reset-request-form">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                <button type="submit" id="send-code-btn" class="btn-primary">인증 코드 발송</button>
            </form>

            <form id="reset-confirm-form" class="hidden" style="margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
                <div class="form-group">
                    <label for="code">인증 코드 (6자리)</label>
                    <input type="text" id="code" required maxlength="6" placeholder="000000">
                </div>
                <div class="form-group">
                    <label for="new_password">새 비밀번호</label>
                    <input type="password" id="new_password" required minlength="8" placeholder="8자 이상 입력">
                </div>
                <button type="submit" class="btn-primary">비밀번호 변경</button>
            </form>

            <div class="auth-links">
                <a href="/login.html">로그인으로 돌아가기</a>
            </div>
        </div>
    </main>

    <script>
        async function handleResponse(response) {
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || data.detail || response.statusText || '오류 발생');
            }
            return data;
        }

        const requestForm = document.getElementById('reset-request-form');
        const confirmForm = document.getElementById('reset-confirm-form');
        
        requestForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = requestForm.querySelector('button');

            // 로딩 상태 시작
            submitBtn.disabled = true;
            const originalText = submitBtn.innerText;
            submitBtn.innerText = '보내는 중...';
            submitBtn.style.backgroundColor = '#ccc';

            try {
                const result = await fetch('/members/password/reset/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                }).then(handleResponse);

                confirmForm.classList.remove('hidden');
                submitBtn.innerText = '코드 재발송';
            } catch (err) {
                alert('실패: ' + err.message);
                submitBtn.innerText = originalText;
            } finally {
                // 로딩 상태 종료
                submitBtn.disabled = false;
                submitBtn.style.backgroundColor = '#6f42c1';
            }
        });

        confirmForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const new_password = document.getElementById('new_password').value;

            try {
                const result = await fetch('/members/password/reset/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, new_password })
                }).then(handleResponse);

                alert(result.message || '비밀번호가 성공적으로 변경되었습니다.');
                window.location.href = '/login.html';
            } catch (err) {
                alert('실패: ' + err.message);
            }
        });
    </script>
</body>
</html>
