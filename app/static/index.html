<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀플링 - Teampling</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">팀플링</a>
        <div class="nav-links" id="nav-links">
            <a href="/static/login.html" class="login-btn">로그인</a>
        </div>
    </header>

    <main>
        <div id="content" class="welcome-msg">
            <h1>팀플링에 오신 것을 환영합니다!</h1>
            <p>팀 프로젝트를 더 쉽고 효율적으로 관리하세요.</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const navLinks = document.getElementById('nav-links');
            const token = localStorage.getItem('access_token');

            if (token) {
                // 내 정보 최신화
                try {
                    const response = await fetch('/members/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        const result = await response.json();
                        const user = result.data;
                        localStorage.setItem('user_username', user.username);
                        localStorage.setItem('user_profile', user.profile_url || '');
                        localStorage.setItem('user_id', user.id);
                        
                        renderHeader(user.username, user.profile_url);
                        
                        const contentDiv = document.getElementById('content');
                        contentDiv.classList.remove('welcome-msg');
                        contentDiv.innerHTML = `
                            <div class="dashboard">
                                <section class="dashboard-section">
                                    <div class="section-header">
                                        <h2>새 알림</h2>
                                    </div>
                                    <div class="placeholder-box" style="padding: 1.5rem; border-style: solid; border-width: 1px; background: #fff; text-align: left;">
                                        <p>새로운 알림 기능 준비 중입니다.</p>
                                    </div>
                                </section>

                                <section class="dashboard-section" style="margin-top: 2rem;">
                                    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                        <h2>내 프로젝트</h2>
                                        <button class="btn-sm btn-primary" onclick="location.href='/static/project-create.html'" style="width: auto; margin-top: 0;">+ 새 프로젝트</button>
                                    </div>
                                    <div class="slider-wrapper">
                                        <button class="slider-btn left" onclick="scrollSlider('my-projects-list', -1)">&#10094;</button>
                                        <div id="my-projects-list" class="project-slider">
                                            <div class="placeholder-box" style="background: #fff; border-style: solid; border-width: 1px; text-align: left; width: 100%; grid-column: 1 / -1;">
                                                <p>프로젝트를 불러오는 중...</p>
                                            </div>
                                        </div>
                                        <button class="slider-btn right" onclick="scrollSlider('my-projects-list', 1)">&#10095;</button>
                                    </div>
                                </section>

                                <section class="dashboard-section" style="margin-top: 2rem;">
                                    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                        <h2>할 일</h2>
                                    </div>
                                    <div class="task-board">
                                        <!-- Planned -->
                                        <div class="task-column" ondragover="allowDrop(event)" ondrop="dropTask(event, 'planned')">
                                            <div class="task-column-header">
                                                <h3>시작 전</h3>
                                                <span id="count-planned" class="task-count">0</span>
                                            </div>
                                            <div id="list-planned" class="task-list"></div>
                                        </div>

                                        <!-- Doing -->
                                        <div class="task-column" ondragover="allowDrop(event)" ondrop="dropTask(event, 'doing')">
                                            <div class="task-column-header">
                                                <h3>진행 중</h3>
                                                <span id="count-doing" class="task-count">0</span>
                                            </div>
                                            <div id="list-doing" class="task-list"></div>
                                        </div>

                                        <!-- Done -->
                                        <div class="task-column" ondragover="allowDrop(event)" ondrop="dropTask(event, 'done')">
                                            <div class="task-column-header">
                                                <h3>완료</h3>
                                                <span id="count-done" class="task-count">0</span>
                                            </div>
                                            <div id="list-done" class="task-list"></div>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        `;
                        await loadMyProjects();
                        loadMyTasks();
                    } else {
                        // 토큰 만료 등
                        localStorage.clear();
                        location.reload();
                    }
                } catch (error) {
                    console.error('내 정보 로드 실패:', error);
                }
            }
        });

        function renderHeader(username, profileUrl) {
            const navLinks = document.getElementById('nav-links');
            const displayName = username || '사용자';
            const profileImg = profileUrl && profileUrl !== 'null' 
                ? profileUrl 
                : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            navLinks.innerHTML = `
                <div class="user-profile-info" onclick="location.href='/static/profile.html'" style="cursor: pointer;">
                    <img src="${profileImg}" alt="profile" class="header-profile-img">
                    <span class="user-nickname">${displayName}</span>
                    <button onclick="event.stopPropagation(); logout()" style="color: #6c757d; font-size: 0.85rem; padding: 0.2rem 0.5rem; border: 1px solid #dee2e6; border-radius: 4px; margin-left: 5px;">로그아웃</button>
                </div>
            `;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function scrollSlider(id, direction) {
            const slider = document.getElementById(id);
            // 보여지는 영역의 너비만큼 이동 (페이징 효과)
            const scrollAmount = slider.clientWidth;
            slider.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        let projectsMap = {};

        async function loadMyProjects() {
            const token = localStorage.getItem('access_token');
            const grid = document.getElementById('my-projects-list');
            try {
                const response = await fetch('/project/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                
                let projects = [];
                if (result.data && Array.isArray(result.data.items)) {
                    projects = result.data.items;
                } else if (Array.isArray(result.data)) {
                    projects = result.data;
                } else if (Array.isArray(result)) {
                    projects = result;
                }
                
                projectsMap = {};
                projects.forEach(p => {
                    projectsMap[p.id] = p.name;
                });

                if (projects.length === 0) {
                    grid.innerHTML = `
                        <div class="placeholder-box" style="background: #fff; border-style: solid; border-width: 1px; text-align: left; width: 100%; grid-column: 1 / -1;">
                            <p>참여 중인 프로젝트가 없습니다. 새로운 프로젝트를 시작해보세요!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = projects.map(p => {
                    const startDate = p.start_date ? p.start_date.split('T')[0] : '미정';
                    const endDate = p.end_date ? p.end_date.split('T')[0] : '미정';
                    
                    return `
                        <div class="project-card" onclick="location.href='/static/project-detail.html?id=${p.id}'">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                                <h3 style="margin: 0;">${p.name || '이름 없음'}</h3>
                                ${p.is_leader ? '<span style="font-size: 0.7rem; background: #e9ecef; padding: 2px 6px; border-radius: 4px;">리더</span>' : ''}
                            </div>
                            <p class="date">${startDate} ~ ${endDate}</p>
                            <p style="font-size: 0.9rem; color: #495057; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8rem;">
                                ${p.detail || '설명이 없습니다.'}
                            </p>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('loadMyProjects failed:', error);
                grid.innerHTML = `<p style="color: #dc3545;">데이터를 불러오는 데 실패했습니다.</p>`;
            }
        }

        // --- Task Logic ---
        let myTasks = [];

        async function loadMyTasks() {
            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch('/work/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch tasks');
                const result = await response.json();
                
                if (result.data && Array.isArray(result.data.items)) {
                    myTasks = result.data.items;
                } else {
                    myTasks = [];
                }
                renderTasks();
            } catch (e) {
                console.error('Task 로드 실패', e);
                const states = ['planned', 'doing', 'done'];
                states.forEach(state => {
                    document.getElementById(`list-${state}`).innerHTML = '<p style="font-size: 0.8rem; color: #dc3545; text-align: center; margin-top: 1rem;">로딩 실패</p>';
                });
            }
        }

        function renderTasks() {
            const states = ['planned', 'doing', 'done'];
            states.forEach(state => {
                const listEl = document.getElementById(`list-${state}`);
                const countEl = document.getElementById(`count-${state}`);
                const tasks = myTasks.filter(t => t.state === state);
                
                countEl.innerText = tasks.length;
                listEl.innerHTML = tasks.map(t => `
                    <div class="task-card" 
                         draggable="true" 
                         ondragstart="dragTask(event, '${t.id}')"
                         onclick="openTaskModal('${t.id}')">
                        <div style="font-size: 0.7rem; color: #6f42c1; font-weight: bold; margin-bottom: 0.3rem;">
                            ${projectsMap[t.project_id] || '알 수 없는 프로젝트'}
                        </div>
                        <h4>${t.title}</h4>
                        <p>${t.detail || ''}</p>
                        <div class="task-card-footer">
                            <div class="task-date">📅 ${t.end_date.split('T')[0]} 까지</div>
                        </div>
                    </div>
                `).join('');
                
                if (tasks.length === 0) {
                    listEl.innerHTML = '<p style="font-size: 0.8rem; color: #adb5bd; text-align: center; margin-top: 1rem;">작업이 없습니다.</p>';
                }
            });
        }

        function dragTask(event, taskId) {
            event.dataTransfer.setData("taskId", taskId);
            setTimeout(() => {
                event.target.style.opacity = '0.5';
            }, 0);
        }

        function allowDrop(event) {
            event.preventDefault();
        }

        async function dropTask(event, newState) {
            event.preventDefault();
            const taskId = event.dataTransfer.getData("taskId");
            const task = myTasks.find(t => t.id === taskId);
            
            document.querySelectorAll('.task-card').forEach(el => el.style.opacity = '1');

            if (task && task.state !== newState) {
                const token = localStorage.getItem('access_token');
                try {
                    const response = await fetch(`/project/${task.project_id}/work/${taskId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ state: newState })
                    });

                    if (response.ok) {
                        loadMyTasks();
                    } else {
                        const err = await response.json();
                        alert('상태 변경 실패: ' + (err.message || '권한이 없거나 오류가 발생했습니다.'));
                        loadMyTasks();
                    }
                } catch (e) {
                    alert('통신 오류');
                    loadMyTasks();
                }
            }
        }

        function openTaskModal(taskId) {
            const modal = document.getElementById('task-modal');
            const form = document.getElementById('task-form');
            const task = myTasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('task-id').value = task.id;
            document.getElementById('task-project-id').value = task.project_id;
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-detail').value = task.detail || '';
            document.getElementById('task-start').value = task.start_date.split('T')[0];
            document.getElementById('task-end').value = task.end_date.split('T')[0];
            document.getElementById('task-state').value = task.state;
            
            modal.classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('task-modal').classList.remove('active');
        }

        async function deleteTask() {
            const taskId = document.getElementById('task-id').value;
            const projectId = document.getElementById('task-project-id').value;
            if (!taskId || !confirm('정말로 이 작업을 삭제하시겠습니까?')) return;

            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch(`/project/${projectId}/work/${taskId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    closeTaskModal();
                    loadMyTasks();
                } else {
                    alert('삭제 실패');
                }
            } catch (e) {
                alert('오류 발생');
            }
        }

        // task-form event listener will be added in DOMContentLoaded or after content is rendered
        // But since we are replacing contentDiv.innerHTML, we need to re-bind or use delegation
        document.addEventListener('submit', async (e) => {
            if (e.target && e.target.id === 'task-form') {
                e.preventDefault();
                const token = localStorage.getItem('access_token');
                const taskId = document.getElementById('task-id').value;
                const projectId = document.getElementById('task-project-id').value;
                
                const data = {
                    title: document.getElementById('task-title').value,
                    detail: document.getElementById('task-detail').value,
                    start_date: document.getElementById('task-start').value + "T00:00:00",
                    end_date: document.getElementById('task-end').value + "T23:59:59",
                    state: document.getElementById('task-state').value
                };

                try {
                    const response = await fetch(`/project/${projectId}/work/${taskId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        closeTaskModal();
                        loadMyTasks();
                    } else {
                        const err = await response.json();
                        alert('저장 실패: ' + (err.message || '오류가 발생했습니다.'));
                    }
                } catch (e) {
                    alert('통신 오류');
                }
            }
        });
    </script>

    <!-- 할 일 수정 모달 (메인 페이지에서는 수정만 가능하도록 구현, 생성은 프로젝트 상세에서) -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeTaskModal()">&times;</span>
            <div class="modal-header">
                <h2>할 일 수정</h2>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <input type="hidden" id="task-project-id">
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="task-title" required placeholder="어떤 일을 해야 하나요?">
                </div>
                <div class="form-group">
                    <label>상세 내용</label>
                    <textarea id="task-detail" rows="3" placeholder="상세 설명을 입력하세요"></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>시작일</label>
                        <input type="date" id="task-start" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>종료일</label>
                        <input type="date" id="task-end" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>상태</label>
                    <select id="task-state">
                        <option value="planned">시작 전</option>
                        <option value="doing">진행 중</option>
                        <option value="done">완료</option>
                    </select>
                </div>
                <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <button type="submit" class="btn-primary" style="margin-top: 0;">저장하기</button>
                    <button type="button" class="btn-danger" style="width: auto;" onclick="deleteTask()">삭제</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
