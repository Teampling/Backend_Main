<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>лЎңк·ёмқё - нҢҖн”Ңл§Ғ</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">нҢҖн”Ңл§Ғ</a>
    </header>

    <main>
        <div class="auth-container">
            <h2>лЎңк·ёмқё</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">мқҙл©”мқј</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="password">л№„л°ҖлІҲнҳё</label>
                    <input type="password" id="password" required placeholder="л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҳм„ёмҡ”">
                </div>
                <button type="submit" class="btn-primary">лЎңк·ёмқё</button>
            </form>
            <div class="auth-links">
                <a href="/signup.html">нҡҢмӣҗк°Җмһ…</a>
                <span>|</span>
                <a href="/password-reset.html">л№„л°ҖлІҲнҳё м°ҫкё°</a>
            </div>
        </div>
    </main>

    <script>
        async function handleResponse(response) {
            const data = await response.json();
            if (!response.ok) {
                // error message мҡ°м„ мҲңмң„: response.message > response.detail > statusText
                throw new Error(data.message || data.detail || response.statusText || 'мҳӨлҘҳ л°ңмғқ');
            }
            return data;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);

            try {
                // login APIлҠ” Swagger нҳёнҷҳмқ„ мң„н•ҙ ApiResponseлЎң к°җмӢём§Җ м•ҠмқҖ м§Ғм ‘м Ғмқё TokenOutмқ„ л°ҳнҷҳн•Ё
                const tokens = await fetch('/members/login', {
                    method: 'POST',
                    body: formData
                }).then(handleResponse);

                // tokensлҠ” {access_token, refresh_token, token_type} м§Ғм ‘ к°қмІҙмһ„
                localStorage.setItem('access_token', tokens.access_token);
                localStorage.setItem('refresh_token', tokens.refresh_token);

                // мӮ¬мҡ©мһҗ м •ліҙ мЎ°нҡҢ (/me лҠ” ApiResponse[MemberOut] нҳ•нғңмһ„)
                const userResult = await fetch('/members/me', {
                    headers: {
                        'Authorization': `Bearer ${tokens.access_token}`
                    }
                }).then(handleResponse);

                localStorage.setItem('user_username', userResult.data.username);
                localStorage.setItem('user_profile', userResult.data.profile_url || '');
                localStorage.setItem('user_id', userResult.data.id);

                // лҰ¬лӢӨмқҙл үнҠё мІҳлҰ¬
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                window.location.href = redirect ? decodeURIComponent(redirect) : '/';
            } catch (err) {
                alert('лЎңк·ёмқё мӢӨнҢЁ: ' + err.message);
            }
        });
    </script>
</body>
</html>
