name: CD

on:
  push:
    branches:
      - 'build/6-ci-cd-deploy'

env:
  IMAGE_NAME: ghcr.io/${{ steps.repo.outputs.repo }}/backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 이미지 태그 생성
        id: vars
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: GHCR 로그인
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 레포 이름 소문자 변환
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 도커 이미지 빌드
        run: |
          docker build \
            -f Dockerfile \
            -t $IMAGE_NAME:${{ steps.vars.outputs.tag }} \
            -t $IMAGE_NAME:latest \
            .

      - name: 도커 이미지 푸시
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.tag }}
          docker push $IMAGE_NAME:latest

      - name: 서버 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /home/${{ secrets.DEPLOY_USER }}/teampling

            export IMAGE_TAG=${{ steps.vars.outputs.tag }}

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}

            docker compose -f docker-compose.prod.yml pull app

            docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head

            docker compose -f docker-compose.prod.yml up -d app nginx
            docker image prune -f